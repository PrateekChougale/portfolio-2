<section id="contact" class="section">
  <div class="section-inner">
    <div class="section-header">
      <span class="section-tag">05. Contact</span>
      <h2 class="section-title">Let's <span class="gradient-text">Work Together</span></h2>
      <p class="section-subtitle">Have a project that needs testing? Drop me a message and I'll get back to you shortly.</p>
    </div>
    <div class="contact-grid">
      <form class="contact-form" (ngSubmit)="onSubmit()">
        <div class="form-group"><label>Your Name</label><input [(ngModel)]="formData.name" name="name" placeholder="John Doe" required></div>
        <div class="form-group"><label>Email Address</label><input [(ngModel)]="formData.email" name="email" type="email" placeholder="john&#64;example.com" required></div>
        <div class="form-group"><label>Subject</label><input [(ngModel)]="formData.subject" name="subject" placeholder="Let's discuss a project"></div>
        <div class="form-group"><label>Message</label><textarea [(ngModel)]="formData.message" name="message" rows="5" placeholder="Tell me about your project..." required></textarea></div>
        <button type="submit" class="btn btn-primary btn-full" [class.sent]="submitted">
          {{ submitted ? '✅ Message Sent!' : '✈ Send Message' }}
        </button>
      </form>
      <div class="contact-info">
        @for (card of contactCards; track card.title) {
          <div class="contact-card">
            <div class="contact-card-icon">{{ card.icon }}</div>
            <div><h4>{{ card.title }}</h4><p>{{ card.value }}</p></div>
          </div>
        }
      </div>
    </div>
  </div>
</section>
